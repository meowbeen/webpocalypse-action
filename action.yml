name: "Webpocalypse"
description: "Automatically optimize images (WebP/AVIF) in pull requests and pushes using the webpocalypse CLI"
author: "Mubeen Khan"

branding:
  icon: "zap"
  color: "pink"

inputs:
  format:
    description: "Output format: webp | avif | both"
    required: false
    default: "webp"

  quality:
    description: "Compression quality (1–100)"
    required: false
    default: "80"

  lossless:
    description: "Enable lossless compression"
    required: false
    default: "false"

  max-width:
    description: "Maximum output width in pixels (optional)"
    required: false

  max-height:
    description: "Maximum output height in pixels (optional)"
    required: false

  paths:
    description: >
      Comma-separated list of directories.
      Behaviour differs by mode — this input does double duty:
        • changed-only: true  → acts as a scope filter; only changed files
          whose path starts with one of these directories are processed.
          Useful for monorepos where you only care about e.g. "public/".
        • changed-only: false → acts as the list of directories to scan in full.
      Default "." means "the whole repository" in both modes.
    required: false
    default: "."

  changed-only:
    description: "Only process image files changed in this PR or push (default: true)"
    required: false
    default: "true"

  commit-back:
    description: "Commit optimized images back to the branch"
    required: false
    default: "false"

  commit-message:
    description: "Commit message used when committing optimized images"
    required: false
    default: "chore: optimize images [webpocalypse]"

  token:
    description: >
      GitHub token used to push the commit when commit-back is true.
      Not required — and never read — when commit-back is false.
      Defaults to the built-in GITHUB_TOKEN. Only override if you need
      a PAT (e.g. to trigger downstream workflows on the pushed commit).
    required: false
    default: ${{ github.token }}

outputs:
  files-converted:
    description: "Number of image files successfully converted"

  bytes-saved:
    description: "Total bytes saved across all converted files"

  savings-percent:
    description: "Overall size reduction as a percentage"

runs:
  using: "node20"
  main: "dist/index.js"
